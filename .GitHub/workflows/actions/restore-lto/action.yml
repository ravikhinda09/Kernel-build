name: 'Restore ThinLTO Cache'
description: 'Incremental multi-thread object mapping optimizer'
inputs:
  cache_path:
    required: true
  cache_key:
    required: true
  restore_keys:
    required: false
  cache_bucket:
    required: true
runs:
  using: 'composite'
  steps:
    - name: Re-indexing thinLTO objects
      uses: actions/cache/restore@v4
      with:
        path: ${{ inputs.cache_path }}
        key: ${{ inputs.cache_key }}
        restore-keys: ${{ inputs.restore_keys }}
