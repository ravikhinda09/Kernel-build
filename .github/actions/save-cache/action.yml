name: 'Release Tar Save Ccache'
description: 'Ccache ko compress karke direct release assets mein push karna'

runs:
  using: 'composite'
  steps:
    - name: 💾 Save Ccache to Release Tar
      shell: bash
      run: |
        set -euo pipefail
        cd $HOME
        echo "🗜️ Packaging Ccache folder..."
        tar -I pigz -cf ccache-release-dump.tar.gz .ccache
        
        echo "🚀 Uploading Ccache Tarball to Release Storage..."
        # FIX: GITHUB_TOKEN environment variable ko direct bash execution inline mein inject kiya hai
        export GITHUB_TOKEN="${{ github.token }}"
        gh release upload toolchain-cache ccache-release-dump.tar.gz --clobber || \
        echo "⚠️ Release upload failed, make sure toolchain-cache release tag exists!"
        
        rm -f ccache-release-dump.tar.gz
