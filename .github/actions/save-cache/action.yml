name: 'Release Tar Save Ccache'
description: 'Ccache ko compress karke direct ccache-storage release mein push karna'

runs:
  using: 'composite'
  steps:
    - name: 💾 Save Ccache to Release Tar
      shell: bash
      run: |
        set -euo pipefail
        cd $HOME
        echo "🗜️ Packaging Ccache folder..."
        tar -I pigz -cf ccache-release-dump.tar.gz .ccache
        
        export GITHUB_TOKEN="${{ github.token }}"
        REPO_NAME="${{ github.repository }}"
        echo "🚀 Verifying and Uploading Ccache to its own tag..."
        
        # Checking and auto-creating tag without .git directory restriction
        gh release view ccache-storage --repo "$REPO_NAME" || \
        gh release create ccache-storage --repo "$REPO_NAME" --title "AURA Kernel Ccache Storage" --notes "Automated Ccache Delta Storage Logs"
        
        # Uploading asset using remote repo targeting
        gh release upload ccache-storage ccache-release-dump.tar.gz --repo "$REPO_NAME" --clobber
        
        rm -f ccache-release-dump.tar.gz
