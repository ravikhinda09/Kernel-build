name: 'Release Tar Save Ccache'
description: 'Ccache ko compress karke direct ccache-storage release mein push karna'

runs:
  using: 'composite'
  steps:
    - name: 💾 Save Ccache to Release Tar
      shell: bash
      run: |
        set -euo pipefail
        cd $HOME
        echo "🗜️ Packaging Ccache folder..."
        tar -I pigz -cf ccache-release-dump.tar.gz .ccache
        
        export GITHUB_TOKEN="${{ github.token }}"
        echo "🚀 Verifying and Uploading Ccache to its own tag..."
        
        # 🔥 FIX: Agar 'ccache-storage' tag nahi hai, toh ye khud use banayega
        gh release view ccache-storage || gh release create ccache-storage --title "AURA Kernel Ccache Storage" --notes "Automated Ccache Delta Storage Logs"
        
        # Apne personal tag me upload aur overwrite lock
        gh release upload ccache-storage ccache-release-dump.tar.gz --clobber
        
        rm -f ccache-release-dump.tar.gz
