name: 'Release Tar Save ThinLTO'
description: 'LTO cache ko compress karke direct lto-storage release mein push karna'

runs:
  using: 'composite'
  steps:
    - name: 💾 Save ThinLTO to Release Tar
      shell: bash
      run: |
        set -euo pipefail
        cd $HOME
        echo "🗜️ Packaging ThinLTO folder..."
        tar -I pigz -cf lto-release-dump.tar.gz .ldcache
        
        export GITHUB_TOKEN="${{ github.token }}"
        echo "🚀 Verifying and Uploading ThinLTO to its own tag..."
        
        # 🔥 FIX: Agar 'lto-storage' tag nahi hai, toh ye khud use banayega
        gh release view lto-storage || gh release create lto-storage --title "AURA Kernel ThinLTO Storage" --notes "Automated ThinLTO Object Storage Logs"
        
        # Apne personal tag me upload aur overwrite lock
        gh release upload lto-storage lto-release-dump.tar.gz --clobber
        
        rm -f lto-release-dump.tar.gz
