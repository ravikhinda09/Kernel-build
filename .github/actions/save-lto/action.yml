name: 'Release Tar Save ThinLTO'
description: 'LTO cache ko compress karke direct release assets mein push karna'

runs:
  using: 'composite'
  steps:
    - name: 💾 Save ThinLTO to Release Tar
      shell: bash
      run: |
        set -euo pipefail
        cd $HOME
        echo "🗜️ Packaging ThinLTO folder..."
        tar -I pigz -cf lto-release-dump.tar.gz .ldcache
        
        echo "🚀 Uploading ThinLTO Tarball to Release Storage..."
        # FIX: GITHUB_TOKEN inline setup fix
        export GITHUB_TOKEN="${{ github.token }}"
        gh release upload toolchain-cache lto-release-dump.tar.gz --clobber || \
        echo "⚠️ LTO Upload skipped!"
        
        rm -f lto-release-dump.tar.gz
