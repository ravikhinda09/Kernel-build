name: 'Release Tar Save ThinLTO'
description: 'LTO cache ko compress karke direct lto-storage release mein push karna'

runs:
  using: 'composite'
  steps:
    - name: 💾 Save ThinLTO to Release Tar
      shell: bash
      run: |
        set -euo pipefail
        cd $HOME
        echo "🗜️ Packaging ThinLTO folder..."
        tar -I pigz -cf lto-release-dump.tar.gz .ldcache
        
        export GITHUB_TOKEN="${{ github.token }}"
        REPO_NAME="${{ github.repository }}"
        echo "🚀 Verifying and Uploading ThinLTO to its own tag..."
        
        # Checking and auto-creating tag without .git directory restriction
        gh release view lto-storage --repo "$REPO_NAME" || \
        gh release create lto-storage --repo "$REPO_NAME" --title "AURA Kernel ThinLTO Storage" --notes "Automated ThinLTO Object Storage Logs"
        
        # Uploading asset using remote repo targeting
        gh release upload lto-storage lto-release-dump.tar.gz --repo "$REPO_NAME" --clobber
        
        rm -f lto-release-dump.tar.gz
