# =========================================================
# OnePlus 13R (AURA) Pipeline - Full Architecture Cleanup
# Maintainer : ravikhinda09
# Purpose    : Dynamic Cleanup with On-Demand Release Wipe
# =========================================================

name: 🧹 Pipeline Deep Cleanup

on:
  workflow_dispatch:
    inputs:
      clean_ccache:
        description: 'Clean Ccache & ThinLTO Storage Releases?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write # CRITICAL: Releases ke andar se storage artifacts delete karne ke liye zaroori hai

jobs:
  deep_clean:
    name: 🧼 Full System Cache & Storage Purge
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v6

      - name: 🗑️ Reset GitHub Storage Releases (Ccache & LTO Tarballs)
        if: ${{ github.event.inputs.clean_ccache == 'true' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::group::Purging Storage Release Artifacts"
          set +e # Files na milne par script ko crash hone se rokega
          
          REPO_NAME="${{ github.repository }}"
          
          # 1. Ccache Storage Release Assets Reset
          echo "🔍 Checking for Ccache storage tags..."
          if gh release view ccache-storage --repo "$REPO_NAME" &>/dev/null; then
            echo "🗑️ Deleting old Ccache tarball & math statistics from release..."
            gh release delete-asset ccache-storage ccache-release-dump.tar.gz --repo "$REPO_NAME" -y || true
            gh release delete-asset ccache-storage current_stats.txt --repo "$REPO_NAME" -y || true
            echo "✅ Ccache release repository points cleared!"
          else
            echo "✨ No active ccache-storage release found."
          fi
          
          # 2. ThinLTO Storage Release Assets Reset
          echo "🔍 Checking for ThinLTO storage tags..."
          if gh release view lto-storage --repo "$REPO_NAME" &>/dev/null; then
            echo "🗑️ Deleting old LTO map & binary streams from release..."
            gh release delete-asset lto-storage lto-release-dump.tar.gz --repo "$REPO_NAME" -y || true
            gh release delete-asset lto-storage current_lto_map.txt --repo "$REPO_NAME" -y || true
            echo "✅ ThinLTO release repository points cleared!"
          else
            echo "✨ No active lto-storage release found."
          fi
          
          echo "::endgroup::"

      - name: ⏭️ Skip Notification
        if: ${{ github.event.inputs.clean_ccache == 'false' }}
        shell: bash
        run: |
          echo "✨ Release Storage Cleanup was skipped by user option. Keeping older cache assets intact!"

      - name: 🧼 Local Run-time Environments Reset ($HOME Paths)
        shell: bash
        run: |
          echo "::group::Flushing Local Runner Buffers"
          
          # 🟢 Tumhare layout ke mutabik $HOME directories ka permanent wipeout (Ye hamesha chalega)
          echo "🧹 Clearing local execution directories..."
          rm -rf $HOME/.ccache/* || true
          rm -rf $HOME/.ldcache/* || true
          rm -rf $HOME/clang-17 || true
          rm -rf $HOME/AnyKernel3 || true
          rm -rf $HOME/susfs4ksu || true
          rm -rf $HOME/kernel-source || true
          rm -rf $HOME/sm8650-modules || true
          
          # Workspace ke baaki temporary log layers saaf karna
          echo "🧹 Scrubbing residual workspace traces..."
          cd $GITHUB_WORKSPACE
          rm -rf build.log || true
          rm -rf *.zip || true
          rm -rf out/ || true
          
          echo "✅ Local runner structures are now 100% sterile!"
          echo "::endgroup::"

      - name: 📊 Free Space Audit Report
        shell: bash
        run: |
          echo "======================================================="
          echo "📊 POST-CLEANUP RUNNER FREE SPACE REPORT"
          echo "======================================================="
          df -h /
          echo "======================================================="
